spring:
  application:
    name: blogPlatform
  data:
    mongodb:
      auto-index-creation: true
      uri: ${MONGODB_URI}
      database: blogPlatform
    redis:
      host: localhost
      port: 6379
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

cloudinary:
  cloud-name: ${cloudinary_cloud_name}
  api-key: ${cloudinary_api_key}
  api-secret: ${cloudinary_api_secret}

server:
  port: ${PORT}

jwt:
  secret: ${JWT_SECRET}
