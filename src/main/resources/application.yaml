spring:
  application:
    name: blogPlatform
  data:
    mongodb:
      auto-index-creation: true
      uri: ${MONGODB_URI}
      database: blogPlatform
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_ID}
    password: ${EMAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

    properties:
      security.protocol: SSL

      ssl.keystore.type: PKCS12
      ssl.keystore.location: ${KAFKA_KEYSTORE_LOCATION}
      ssl.keystore.password: ${KAFKA_KEYSTORE_PASSWORD}

      ssl.truststore.location: ${KAFKA_TRUSTSTORE_LOCATION}
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}

      spring.json.trusted.packages: "com.learning.blogPlatform.entities"
      spring.json.use.type.headers: false
      spring.json.value.default.type: com.learning.blogPlatform.entities.NotificationEvent

    consumer:
      group-id: blog-platform
      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

    producer:
      retries: 3

      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

cloudinary:
  cloud-name: ${cloudinary_cloud_name}
  api-key: ${cloudinary_api_key}
  api-secret: ${cloudinary_api_secret}

server:
  port: ${PORT}

jwt:
  secret: ${JWT_SECRET}
